<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>독해 지문 분석기</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-head">
        <h1>📚 지문 분석기</h1>
        <button id="btn-settings" class="icon-btn" title="설정">⚙️</button>
      </div>
      <button id="btn-new" class="primary-btn">＋ 새 분석</button>
      <div id="analysis-list" class="analysis-list"></div>
    </aside>

    <main id="main">
      <!-- 입력 화면 -->
      <section id="view-input">
        <h2>영어 독해 지문 붙여넣기</h2>
        <textarea id="passage-input" placeholder="분석할 영어 지문을 붙여 넣으세요…" spellcheck="false"></textarea>
        <div class="input-actions">
          <label class="checkbox-label">
            <input type="checkbox" id="use-web-search" checked />
            웹 검색으로 출처 찾기 <span class="hint">(정확도 ↑, 검색당 약 $0.01 추가)</span>
          </label>
          <button id="btn-analyze" class="primary-btn big">분석 시작</button>
        </div>
      </section>

      <!-- 진행 화면 -->
      <section id="view-progress" hidden>
        <h2>분석 중…</h2>
        <div id="progress-status" class="progress-status"></div>
        <pre id="progress-stream" class="progress-stream"></pre>
        <p class="hint">분석에는 보통 1~3분이 걸립니다. 창을 닫지 마세요.</p>
      </section>

      <!-- 결과 화면 -->
      <section id="view-result" hidden>
        <div class="result-head">
          <h2 id="result-title"></h2>
          <div class="result-meta" id="result-meta"></div>
        </div>
        <nav class="tabs" id="result-tabs">
          <button data-tab="source" class="tab active">📌 출처</button>
          <button data-tab="analysis" class="tab">📖 지문 분석</button>
          <button data-tab="vocab" class="tab">🔤 단어 클러스터</button>
          <button data-tab="teaching" class="tab">🧑‍🏫 수업 포인트</button>
          <button data-tab="strategy" class="tab">✏️ 풀이 요령</button>
          <button data-tab="passage" class="tab">원문</button>
        </nav>
        <div id="result-body"></div>
      </section>
    </main>
  </div>

  <!-- 설정 모달 -->
  <div id="settings-modal" class="modal-backdrop" hidden>
    <div class="modal">
      <h2>설정</h2>
      <label class="field">
        <span>Anthropic API 키</span>
        <input type="password" id="setting-api-key" placeholder="sk-ant-..." autocomplete="off" />
        <span class="hint" id="setting-key-status"></span>
      </label>
      <label class="field">
        <span>모델</span>
        <select id="setting-model"></select>
        <span class="hint">Opus 4.8: 최고 품질 (지문당 약 $0.1~0.3) · Sonnet 5: 저렴 (약 1/3 비용)</span>
      </label>
      <div class="modal-actions">
        <button id="btn-settings-cancel">닫기</button>
        <button id="btn-settings-save" class="primary-btn">저장</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
